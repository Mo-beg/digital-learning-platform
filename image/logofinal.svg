<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 42" width="175" height="33">
  <!-- NO background — fully transparent -->

  <!-- OPEN BOOK -->
  <!-- Left page gold -->
  <path d="M28,4 L22,0 L0,5 L0,36 L28,40 Z" fill="#fbbf24"/>
  <!-- Right page blue -->
  <path d="M28,4 L34,0 L56,5 L56,36 L28,40 Z" fill="#2563eb"/>
  <!-- Bottom open arc -->
  <path d="M0,36 Q28,46 56,36" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lines left page -->
  <line x1="5"  y1="12" x2="23" y2="11" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <line x1="5"  y1="19" x2="23" y2="18" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <line x1="5"  y1="26" x2="23" y2="25" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  <!-- Lines right page -->
  <line x1="33" y1="11" x2="51" y2="12" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="33" y1="18" x2="51" y2="19" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="33" y1="25" x2="51" y2="26" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <!-- Spine -->
  <line x1="28" y1="4" x2="28" y2="40" stroke="white" stroke-width="1" opacity="0.35"/>

  <!-- TEXT — "Learn" blue, "Hub" gold, same baseline -->
  <text x="66" y="32"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#2563eb">Learn</text>

  <text x="152" y="32"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#f59e0b">Hub</text>

</svg>
